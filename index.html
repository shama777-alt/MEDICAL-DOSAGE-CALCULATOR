<!DOCTYPE html>
<html>
    <head>
        <title>Shammah's Pediatric Dosage Calculator</title>
        <style>
           body {
               background: radial-gradient(circle, #dcdde1, lab(88.59% -5.96 -2.06) 100%);
               height: 100vh;
               margin: 10px;
               justify-content: center;
               padding: 40px;
               background-color: hsla(210, 36%, 96%, 0.695);
               
           }

           .calculator-frame{
              background-color: #d0ddebc8;
              padding: 25px;
              border-radius: 30px;
              box-shadow: inset 0 0 10px #b5bcd2, 10px 10px 20px rgba(0, 0, 0, 0.5);
              border: 4px solid #52677ed4;



               
           }

           .calculators-card{
               font-weight: bold;
               justify-content: center;
               padding: 30px;
               background-color: #ecf0f1;
               border-radius: 20px;
               box-shadow: 0 4px 8px rgba(217, 224, 231, 0.782);
               border: 2px solid #1a252f;
               color: #2c3e50;

           }
           button{
               width: 150px;
               cursor: pointer; ;
               font-weight: bold;
               padding: 8px;
               background-color: #3498db;
               border-radius: 6px;
               box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
               transition: background 0.3s;
               margin-top: 10px; ;
           }
           button:hover{
               background-color: #a6dbff;
           }
           #dosage{
               margin-top: 20px;
               font-weight: bold;
               font-size: 20px;
               color: #334556;
               border-left: 5px solid #3498db;
               background-color: #e8f4fd;
               padding: 15px;
           }
           input, select{
               width: 100px;
               padding: 8px;
               margin-top: 1px;
               border: 1px solid #bdc3c7;
               border-radius: 6px;
               box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
               box-sizing: border-box;
           }
           input{
            background-color: #f9f9f9;
            border: 2px solid #bdc3c7;
           }








        </style>
    </head>
    <body>
        <div class="calculator-frame">
        <div class="calculator-card">
        
        <h2>Pediatric Dosage Calculator:</h2>
        <label for="age">Enter your age(years):</label>
        <input type="number" id="age" name="age"><br><br>
        <label for="weight">Enter your weight(kg):</label>
        <input type="number" id="weight" name="weight"><br><br>
        <label for="height">Enter your height(cm):</label>
        <input type="number" id="height" name="height"><br><br>
        <label for="gender">Select your gender:</label>
        <select id="gender" name="gender">
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select><br><br>
        <button onclick="calculateDosage()">Calculate Dosage</button>
        <p id="dosage"></p>










    <script>
    function calculateDosage() {
            const age = Number(document.getElementById('age').value);
            const weight = Number(document.getElementById('weight').value);
            const height = Number(document.getElementById('height').value);
            const gender = document.getElementById('gender').value;
            let dosage = 0;
            if (age >= 0 && age <= 6) {
                dosage = 0.5;
            } else if (age >= 7 && age <= 12) {
                dosage = 1;
            } else if (age >= 13 && age <= 18) {
                dosage = 1.5;
            } else if (age >= 19) {
                dosage = 2;
            }
            document.getElementById('dosage').innerHTML = `Dosage: ${dosage}`;
        
        if (age >= 0 && age <= 6) {
            dosage = 0.5;
        }
        if (age >= 7 && age <= 12) {
            dosage = 1;
        }
        if (age >= 13 && age <= 18) {
            dosage = 1.5;
        }
        if (age >= 19) {
            dosage = 2;
        }
        let weightDose = weight * dosage;
        let heightDose = height * dosage;
        let totalDose = weightDose + heightDose;
        document.getElementById('dosage').innerHTML = `Dosage: ${totalDose} mg`;
    }

    


    </script>
    </body>
</html>
